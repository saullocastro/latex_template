version: 1
project:

  # Add download to page by specifying the ID:
  downloads:
    - id: output-pdf

  # Define export settings
  exports:
    - id: output-pdf                # ID of the export, to be used for download
      format: pdf                   # Define type of export (--pdf flag uses latex)
      template: ../                 # Template to be used 
      output: ./exports/thesis.pdf  # Specify output path (name) here

      # can be used later
      # articles:
      #   - file: parts/02-introduction.md
      #   - file: parts/03-theory.md
      #   - file: notebooks/data-analysis.ipynb
      #   - file: notebooks/data-collection.ipynb

      # Cover image settings
      cover: cover.png
      cover_margin: "2em"
      cover_width: "0.8\\linewidth"

      # ToC
      tocDepth: 2
      showTOC: true

      # Logo
      logo: cover.png
      logo_width: 1cm

      # layout
      papersize: a4paper
      margin_top: 2.5cm
      margin_bottom: 2.5cm
      margin_left: 2.5cm
      margin_right: 2.5cm
      show_pagenumber: arabic

#       #### Fonts
      fontsize: 2
#       fontstyle: 
#       linespacing: .5
#       justification: false
      
#       #### Theme
#       colortheme: blue.darken(30%)
#       colorheadings: navy
      
# # Preface
