jtex: v1
title: Minimal LaTeX thesis template
description: >-
  A minimal, single-file LaTeX thesis template for MyST
authors:
  - name: Saullo G. P. Castro
version: 0.0.1
license: CC-BY-4.0

tags:
  - paper
  - thesis
github: https://github.com/saullocastro/latex_template
doc:
  - id: title
    required: true
  - id: description
  - id: tags
  - id: date
    required: true
  - id: authors
    required: true
  - id: keywords
  - id: bibliography
options:
  # Cover image
  - id: pdfcover
    type: file
    description: |
      Full-page cover image for the first page (e.g. "images/cover.png")

  # TOC settings
  - id: showTOC
    type: boolean
    default: true
    description: |
      Whether to show the table of contents after the title page
  - id: tocDepth
    type: number
    default: 2
    description: |
      The depth of the table of contents (e.g. 2 for sections and subsections)

  # Page settings
  - id: margin_top
    type: string
    default: "2.5cm"
    description: |
      Top margin of the page
  - id: margin_bottom
    type: string
    default: "2.5cm"
    description: |
      Bottom margin of the page
  - id: margin_left
    type: string
    default: "2.5cm"
    description: |
      Left margin of the page
  - id: margin_right
    type: string
    default: "2.5cm"
    description: |
      Right margin of the page
  - id: papersize
    type: string
    default: "a4paper"
    description: |
      Paper size (e.g. "a4paper", "letterpaper")

parts:
  - id: abstract
    description: >
      A short summary of the document.
    max_words: 500
  - id: acknowledgments
    description: >
      Acknowledgments section placed towards the end of the document.
files:
  - template.tex
packages:
  - amsfonts
  - amsmath
  - amssymb
  - babel
  - booktabs
  - datetime
  - doi
  - enumitem
  - etoolbox
  - fancyhdr
  - fancyvrb
  - float
  - framed
  - geometry
  - graphicx
  - hyperref
  - inputenc
  - mdframed
  - microtype
  - natbib
  - titlesec
  - ulem
  - url
  - xcolor
